# Gestalt Workframe — three-container stack.
# Run from the repo root: `docker compose up --build`
# Then open http://localhost:8080

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      APP_DATABASE_PATH: /data/database.db
      CLOUD_SPILLOVER_DB_PATH: /data/database.db
      CHROMA_DB_DIR: /data/chroma_db
      CORS_ALLOWED_ORIGINS: http://localhost:8080
    volumes:
      - app-data:/data
      - ./deployments:/app/deployments:ro
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      - api

  proxy:
    build:
      context: .
      dockerfile: docker/proxy.Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - api
      - web

volumes:
  app-data:
