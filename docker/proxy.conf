# Public edge for the Docker stack. Everything lives at a single origin so the
# browser sees no CORS boundary. Backend paths are listed explicitly; anything
# else falls through to the static Next.js export.

upstream gestalt_api {
    server api:8000;
}

upstream gestalt_web {
    server web:80;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10m;

    # Common proxy headers shared by every backend location.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # ---- Backend (FastAPI) ------------------------------------------------

    # SSE chat stream — disable proxy buffering so tokens flush immediately.
    location = /chat/stream {
        proxy_pass http://gestalt_api;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Upgrade    $http_upgrade;
        chunked_transfer_encoding on;
    }

    location /admin/api/ { proxy_pass http://gestalt_api; }

    location = /api/deployment-config { proxy_pass http://gestalt_api; }
    location = /modes                  { proxy_pass http://gestalt_api; }
    location = /contact                { proxy_pass http://gestalt_api; }
    location = /intake/questions       { proxy_pass http://gestalt_api; }
    location = /intake/submissions     { proxy_pass http://gestalt_api; }
    location = /health                 { proxy_pass http://gestalt_api; }
    location /health/                  { proxy_pass http://gestalt_api; }
    location = /newsletter/api/subscribe { proxy_pass http://gestalt_api; }
    location = /newsletter/unsubscribe   { proxy_pass http://gestalt_api; }
    location /connectors/webhook/      { proxy_pass http://gestalt_api; }

    # Library JSON feeds are backend-owned; library/* HTML pages live in /web.
    location ~ ^/library/.+\.json$ { proxy_pass http://gestalt_api; }

    # ---- Frontend (static Next.js export) ---------------------------------

    location / {
        proxy_pass http://gestalt_web;
    }
}
