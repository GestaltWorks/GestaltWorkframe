server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Next.js static export writes both /admin/health.html and /admin/health/.
    # Prefer the .html file first so we don't trigger nginx's directory-redirect
    # (which drops the upstream port and 404s through the proxy).
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Long-cache hashed asset bundles. Everything else stays uncached so
    # operator content edits propagate without a forced refresh.
    location /_next/static/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
