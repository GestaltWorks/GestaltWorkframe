[project]
name = "gestalt-connector-hudu"
version = "0.1.0"
description = "Hudu connector for Gestalt deployments"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = ["gestalt-connector-protocol>=0.1.0"]

[project.entry-points."gestalt.connectors"]
"gestalt-connector-hudu" = "gestalt_connector_hudu:HuduConnector"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["gestalt_connector_hudu*"]
