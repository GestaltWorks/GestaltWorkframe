[project]
name = "gestalt-connector-protocol"
version = "0.1.0"
description = "Gestalt connector protocol and canonical Document schema"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = ["pydantic>=2.12.5", "pyyaml>=6.0.3"]

[project.scripts]
connector-test = "gestalt_connector_protocol.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["gestalt_connector_protocol*"]

[tool.pytest.ini_options]
pythonpath = ["."]
