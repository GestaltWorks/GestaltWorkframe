name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $scripts = @("llm/download_model.ps1", "llm/start_server.ps1", "llm/control_local_model.ps1")
          foreach ($script in $scripts) {
            [scriptblock]::Create((Get-Content $script -Raw)) | Out-Null
            Write-Host "parse_ok $script"
          }

      - name: Install Python dependencies
        run: uv sync --frozen --group dev

      - name: Run pytest with coverage
        run: uv run pytest --cov=gestaltworkframe.core --cov=gestaltworkframe.api --cov=gestaltworkframe.kb --cov-report=term --cov-report=xml

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

      - name: Build frontend
        run: pnpm build
